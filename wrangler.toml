name = "ai-portal-os"
compatibility_date = "2024-01-01"

[site]
bucket = "./"

# Headers for security and performance
[[headers]]
for = "/*"
[headers.values]
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://www.google.com https://wttr.in data:; connect-src 'self' https://api.coingecko.com https://wttr.in https://*.supabase.co wss://*.supabase.co; frame-src 'self' https:; font-src 'self'"

[[headers]]
for = "/index.html"
[headers.values]
  Cache-Control = "public, max-age=300, stale-while-revalidate=60"

[[headers]]
for = "/*.css"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.ico"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
